# Mono Gateway DK fan control: EMC2305 PWM → core-cluster thermal zone
# Linear PWM ramp: 40°C (off) → 51 PWM (spin-up) → 255 PWM (80°C full)
INTERVAL=10
DEVPATH=hwmon3=devices/platform/soc/2180000.i2c/i2c-0/i2c-7/7-002e hwmon9=devices/virtual/thermal/thermal_zone3
DEVNAME=hwmon3=emc2305 hwmon9=core_cluster
FCTEMPS=hwmon3/pwm1=hwmon9/temp1_input
FCFANS=hwmon3/pwm1=hwmon3/fan1_input
MINTEMP=hwmon3/pwm1=40
MAXTEMP=hwmon3/pwm1=80
MINSTART=hwmon3/pwm1=51
MINSTOP=hwmon3/pwm1=34
